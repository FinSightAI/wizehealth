<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WizeHealth"/>
<meta name="theme-color" content="#030508"/>
<title>WizeHealth — הבריאות שלך, מנוהלת בחכמה</title>
<link rel="preconnect" href="https://vitara.onrender.com" crossorigin>
<link rel="dns-prefetch" href="https://vitara.onrender.com">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#030508;overflow:hidden}
  #app-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#030508}

  /* First-visit onboarding overlay */
  #wh-ob{position:fixed;inset:0;z-index:99999;background:rgba(3,5,8,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:'Inter',-apple-system,system-ui,sans-serif}
  #wh-ob.gone{display:none}
  .wh-ob-card{background:#0f1628;border:1px solid rgba(236,72,153,0.25);border-radius:22px;padding:32px 28px;max-width:320px;width:90%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
  .wh-ob-icon{width:62px;height:62px;border-radius:16px;background:linear-gradient(135deg,#ec4899,#a855f7);display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 28px rgba(236,72,153,0.4)}
  .wh-ob-title{font-size:20px;font-weight:800;color:#f0f4ff;letter-spacing:-.5px}
  .wh-ob-title em{background:linear-gradient(135deg,#ec4899,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
  .wh-ob-text{font-size:13.5px;color:rgba(255,255,255,0.55);line-height:1.65;max-width:270px}
  .wh-ob-btn{margin-top:4px;background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;border:none;padding:11px 32px;border-radius:99px;font:700 14px inherit;cursor:pointer;width:100%}
  .wh-ob-skip{font-size:12px;color:rgba(255,255,255,0.3);cursor:pointer;border:none;background:none;font-family:inherit}
</style>
</head>
<body>
<iframe id="app-frame" allow="clipboard-write; clipboard-read; camera"></iframe>

<!-- First-visit onboarding — hidden after first dismiss -->
<div id="wh-ob" class="gone">
  <div class="wh-ob-card">
    <div class="wh-ob-icon">❤️</div>
    <div class="wh-ob-title">Wize<em>Health</em></div>
    <p class="wh-ob-text" id="wh-ob-text">עוזר רפואי AI — שאל שאלות, נתח בדיקות דם, וקבל מידע מבוסס מחקר.</p>
    <button class="wh-ob-btn" id="wh-ob-btn" onclick="whObDismiss()">הבנתי</button>
    <button class="wh-ob-skip" id="wh-ob-skip" onclick="whObDismiss()">דלג</button>
  </div>
</div>

<script>
(function () {
  try { fetch('https://vitara.onrender.com/', { mode: 'no-cors', cache: 'no-cache' }).catch(function(){}); } catch (e) {}
  // Keep pinging every 30 s while user is on this page so Render stays warm
  setInterval(function() {
    try { fetch('https://vitara.onrender.com/', { mode: 'no-cors', cache: 'no-cache' }).catch(function(){}); } catch(e) {}
  }, 30000);

  var TARGET = 'https://vitara.onrender.com';
  var p  = new URLSearchParams(location.search);
  // Backward-compat: also accept wl_token from URL fragment.
  var hp = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  var qs = new URLSearchParams();
  // Non-sensitive — stay in query.
  ['wl_nick','wl_plan','lang'].forEach(function (k) {
    var v = hp.get(k) || p.get(k); if (v) qs.set(k, v);
  });
  // wl_token rides in the fragment so it never reaches server / CF logs.
  var tok = hp.get('wl_token') || p.get('wl_token');
  var iframe = document.getElementById('app-frame');
  var src = TARGET + '/' + (qs.toString() ? '?' + qs.toString() : '');
  if (tok) src += '#wl_token=' + encodeURIComponent(tok);
  iframe.src = src;

  var lang = 'he';
  try { lang = (localStorage.getItem('wl_lang') || 'he').slice(0,2); } catch(e){}
  var COPY = {
    he: { text:'עוזר רפואי AI — שאל שאלות, נתח בדיקות דם, וקבל מידע מבוסס מחקר.', btn:'הבנתי', skip:'דלג' },
    en: { text:'AI health companion — ask questions, analyze blood tests, get research-based guidance.', btn:'Got it', skip:'Skip' },
    pt: { text:'Companheiro de saúde com IA — perguntas, exames, informações baseadas em pesquisa.', btn:'Entendi', skip:'Pular' },
    es: { text:'Compañero de salud con IA — preguntas, análisis, información basada en investigación.', btn:'Listo', skip:'Saltar' },
  };
  var c = COPY[lang] || COPY.en;
  document.getElementById('wh-ob-text').textContent = c.text;
  document.getElementById('wh-ob-btn').textContent  = c.btn;
  document.getElementById('wh-ob-skip').textContent = c.skip;

  var force = (p.get('ob') === 'force');
  var seen  = false;
  try { seen = !!localStorage.getItem('wl_ob_health'); } catch(e){}
  if (!seen || force) {
    document.getElementById('wh-ob').classList.remove('gone');
  }
})();

function whObDismiss() {
  try { localStorage.setItem('wl_ob_health', '1'); } catch(e){}
  document.getElementById('wh-ob').classList.add('gone');
}
</script>
</body>
</html>
