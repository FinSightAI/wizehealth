<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<script>
(function(){try{
  var l=(localStorage.getItem('wl_lang')||'he').slice(0,2);
  document.documentElement.dir=l==='he'?'rtl':'ltr';
  document.documentElement.lang=l;
}catch(e){}})();
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WizeHealth"/>
<meta name="theme-color" content="#030508"/>
<title>WizeHealth — הבריאות שלך, מנוהלת בחכמה</title>
<link rel="preconnect" href="https://vitara.onrender.com" crossorigin>
<link rel="dns-prefetch" href="https://vitara.onrender.com">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#030508;overflow:hidden;color:#eef2ff;font-family:'Inter',-apple-system,system-ui,sans-serif}

  /* Full-screen iframe */
  #app-frame{position:fixed;inset:0;border:0;background:#030508;z-index:1;opacity:0;transition:opacity .3s ease}
  #app-frame.ready{opacity:1}

  /* Floating W button */
  #wh-fab{
    position:fixed;bottom:20px;z-index:99999;
    width:44px;height:44px;border-radius:14px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 20px rgba(99,102,241,0.5);
    transition:transform .15s,box-shadow .15s;
  }
  html[dir="rtl"] #wh-fab{right:20px}
  html[dir="ltr"] #wh-fab{left:20px}
  #wh-fab:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(99,102,241,0.6)}
  #wh-fab svg{display:block}

  /* Drawer overlay */
  #wh-overlay{position:fixed;inset:0;z-index:99997;background:rgba(0,0,0,0);pointer-events:none;transition:background .2s}
  #wh-overlay.open{background:rgba(0,0,0,0.45);pointer-events:all}

  /* Drawer panel */
  #wh-drawer{
    position:fixed;bottom:72px;z-index:99998;
    width:220px;
    background:rgba(10,12,24,0.97);backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.1);border-radius:16px;
    padding:16px;
    transform:translateY(12px) scale(0.97);opacity:0;
    transition:transform .18s ease,opacity .18s ease;
    pointer-events:none;
  }
  html[dir="rtl"] #wh-drawer{right:20px}
  html[dir="ltr"] #wh-drawer{left:20px}
  #wh-drawer.open{transform:none;opacity:1;pointer-events:all}

  /* Drawer sections */
  .wh-dr-app{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .wh-dr-app-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#ec4899,#a855f7);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .wh-dr-app-name{font-size:13px;font-weight:800;color:#f0f4ff}
  .wh-dr-app-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
  .wh-dr-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:7px}
  .wh-lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}
  .wh-lang-btn{
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;padding:7px 4px;font:700 11px 'Inter',sans-serif;
    color:rgba(255,255,255,0.45);cursor:pointer;transition:all .15s;text-align:center;
  }
  .wh-lang-btn:hover{background:rgba(236,72,153,0.12);border-color:rgba(236,72,153,0.3);color:#fbcfe8}
  .wh-lang-btn.active{background:rgba(236,72,153,0.18);border-color:rgba(236,72,153,0.5);color:#fbcfe8}

  /* User row */
  .wh-dr-user{display:flex;align-items:center;gap:8px;padding:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:8px}
  .wh-dr-user-info{flex:1;min-width:0}
  .wh-dr-user-name{font-size:12px;font-weight:700;color:#eef2ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wh-dr-user-plan{font-size:10px;font-weight:600;margin-top:1px}

  /* Portal link + signout */
  .wh-dr-portal{display:flex;align-items:center;gap:8px;width:100%;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.18);border-radius:8px;padding:8px 10px;font:600 11px 'Inter',sans-serif;color:rgba(170,180,255,0.8);cursor:pointer;text-decoration:none;margin-bottom:6px;transition:all .15s}
  .wh-dr-portal:hover{background:rgba(99,102,241,0.15);color:#c7d2fe}
  .wh-dr-signout{display:flex;align-items:center;gap:8px;width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px;font:600 11px 'Inter',sans-serif;color:rgba(255,255,255,0.35);cursor:pointer;transition:all .15s}
  .wh-dr-signout:hover{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.25);color:#fca5a5}

  /* Splash */
  #wh-splash{position:fixed;inset:0;z-index:99996;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a1f3a 0%,#0a0e1a 100%);font-family:'Plus Jakarta Sans','Inter',system-ui,sans-serif;transition:opacity .35s ease}
  #wh-splash.gone{opacity:0;pointer-events:none}
  .wh-card{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px;text-align:center}
  .wh-icon{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,#ec4899,#a855f7);display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 12px 40px rgba(236,72,153,0.45)}
  .wh-brand{font-size:28px;font-weight:900;letter-spacing:-1px;color:#f0f4ff}
  .wh-brand em{background:linear-gradient(135deg,#ec4899,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
  .wh-tag{font-size:13px;color:rgba(255,255,255,0.55);max-width:260px;line-height:1.55}
  .wh-bar{width:120px;height:3px;border-radius:99px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:6px}
  .wh-bar i{display:block;width:30%;height:100%;background:linear-gradient(90deg,#ec4899,#a855f7);border-radius:99px;animation:whBar 1.2s ease-in-out infinite}
  @keyframes whBar{0%{transform:translateX(-100%)}100%{transform:translateX(420%)}}
  .wh-ob-extra{margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:10px;max-width:300px}
  .wh-ob-extra p{font-size:12.5px;color:rgba(255,255,255,0.5);line-height:1.55;text-align:center}
  .wh-ob-extra button{background:rgba(236,72,153,0.18);color:#fbcfe8;border:1px solid rgba(236,72,153,0.4);padding:8px 18px;border-radius:99px;font:700 12px inherit;cursor:pointer}
</style>
</head>
<body>

<!-- Full-screen iframe -->
<iframe id="app-frame" src="" allow="clipboard-write; clipboard-read; camera"></iframe>

<!-- Floating W button -->
<button id="wh-fab" onclick="whToggleDrawer()" title="WizeHealth menu" aria-label="WizeHealth menu">
  <svg width="22" height="22" viewBox="0 0 100 100"><text x="50" y="72" text-anchor="middle" font-family="Arial Black,sans-serif" font-weight="900" font-size="68" fill="white">W</text></svg>
</button>

<!-- Drawer overlay (click to close) -->
<div id="wh-overlay" onclick="whCloseDrawer()"></div>

<!-- Drawer panel -->
<div id="wh-drawer">
  <!-- App header -->
  <div class="wh-dr-app">
    <div class="wh-dr-app-icon">❤️</div>
    <div>
      <div class="wh-dr-app-name">WizeHealth</div>
      <div class="wh-dr-app-sub" id="wh-dr-tagline">AI Health Companion</div>
    </div>
  </div>

  <!-- Language -->
  <div class="wh-dr-label" id="wh-dr-lbl-lang">LANGUAGE</div>
  <div class="wh-lang-grid">
    <button class="wh-lang-btn" data-lang="he">HE</button>
    <button class="wh-lang-btn" data-lang="en">EN</button>
    <button class="wh-lang-btn" data-lang="pt">PT</button>
    <button class="wh-lang-btn" data-lang="es">ES</button>
  </div>

  <!-- User (hidden when not signed in) -->
  <div class="wh-dr-user" id="wh-dr-user" style="display:none">
    <div style="width:28px;height:28px;border-radius:8px;background:rgba(236,72,153,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">👤</div>
    <div class="wh-dr-user-info">
      <div class="wh-dr-user-name" id="wh-dr-user-name">—</div>
      <div class="wh-dr-user-plan" id="wh-dr-user-plan"></div>
    </div>
  </div>

  <!-- Portal link -->
  <a class="wh-dr-portal" href="https://wizelife.ai/dashboard.html">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span id="wh-dr-lbl-portal">WizeLife Dashboard</span>
  </a>

  <!-- Sign out -->
  <button class="wh-dr-signout" id="wh-dr-signout" style="display:none" onclick="whSignOut()">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    <span id="wh-dr-lbl-signout">Sign out</span>
  </button>
</div>

<!-- Splash -->
<div id="wh-splash">
  <div class="wh-card">
    <div class="wh-icon">❤️</div>
    <div class="wh-brand">Wize<em>Health</em></div>
    <div class="wh-tag" id="wh-tag">מתחבר לרופאה הדיגיטלית...</div>
    <div class="wh-bar"><i></i></div>
    <div class="wh-ob-extra" id="wh-ob-extra" hidden>
      <p id="wh-ob-text">עוזר רפואי AI — שאל שאלות, נתח בדיקות דם, וקבל מידע מבוסס מחקר.</p>
      <button onclick="whDismiss(true)" id="wh-ob-btn">הבנתי</button>
    </div>
  </div>
</div>

<script>
(function () {
  var LANGS = {
    he: { tag:'מתחבר לרופאה הדיגיטלית...', ob:'עוזר רפואי AI — שאל שאלות, נתח בדיקות דם, וקבל מידע מבוסס מחקר.', btn:'הבנתי', signout:'יציאה', portal:'WizeLife Dashboard', tagline:'AI Health Companion', plan_yolo:'⚡ YOLO', plan_pro:'❆ PRO', plan_free:'' },
    en: { tag:'Connecting to your AI doctor...', ob:'AI health companion — ask questions, analyze blood tests, get research-based info.', btn:'Got it', signout:'Sign out', portal:'WizeLife Dashboard', tagline:'AI Health Companion', plan_yolo:'⚡ YOLO', plan_pro:'❆ PRO', plan_free:'' },
    pt: { tag:'Conectando ao seu médico de IA...', ob:'Companheiro de saúde com IA — perguntas, exames de sangue, info baseada em pesquisa.', btn:'Entendi', signout:'Sair', portal:'Painel WizeLife', tagline:'Companheiro de Saúde IA', plan_yolo:'⚡ YOLO', plan_pro:'❆ PRO', plan_free:'' },
    es: { tag:'Conectando con tu médico IA...', ob:'Compañero de salud con IA — preguntas, análisis, info basada en investigación.', btn:'Listo', signout:'Salir', portal:'Panel WizeLife', tagline:'Compañero de Salud IA', plan_yolo:'⚡ YOLO', plan_pro:'❆ PRO', plan_free:'' },
  };

  var _drawerOpen = false;

  window.whToggleDrawer = function(){
    _drawerOpen ? whCloseDrawer() : whOpenDrawer();
  };
  function whOpenDrawer(){
    _drawerOpen = true;
    document.getElementById('wh-drawer').classList.add('open');
    document.getElementById('wh-overlay').classList.add('open');
  }
  window.whCloseDrawer = function(){
    _drawerOpen = false;
    document.getElementById('wh-drawer').classList.remove('open');
    document.getElementById('wh-overlay').classList.remove('open');
  };

  /* ── Language ── */
  function getLang(){ try{ return (localStorage.getItem('wl_lang')||'he').slice(0,2); }catch(e){ return 'he'; } }
  function applyLang(lang){
    var c = LANGS[lang] || LANGS.en;
    var isRtl = lang === 'he';
    document.documentElement.lang = lang;
    document.documentElement.dir  = isRtl ? 'rtl' : 'ltr';
    document.getElementById('wh-tag').textContent = c.tag;
    document.getElementById('wh-dr-lbl-signout').textContent = c.signout;
    document.getElementById('wh-dr-lbl-portal').textContent = c.portal;
    document.getElementById('wh-dr-tagline').textContent = c.tagline;
    document.querySelectorAll('.wh-lang-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    updatePlanBadge(lang);
  }
  function setLang(lang){
    try{ localStorage.setItem('wl_lang', lang); }catch(e){}
    applyLang(lang);
    var iframe = document.getElementById('app-frame');
    if(iframe.src && iframe.src !== location.href){
      var u = new URL(iframe.src);
      u.searchParams.set('lang', lang);
      iframe.src = u.toString();
    }
  }
  document.querySelectorAll('.wh-lang-btn').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.dataset.lang); whCloseDrawer(); });
  });

  /* ── SSO ── */
  function getSso(){ try{ return JSON.parse(localStorage.getItem('wl_sso')||'{}'); }catch(e){ return {}; } }
  function updatePlanBadge(lang){
    var sso = getSso();
    var plan = sso.plan || localStorage.getItem('wl_plan') || 'free';
    var c = LANGS[lang] || LANGS.en;
    var planEl = document.getElementById('wh-dr-user-plan');
    var txt = plan === 'yolo' ? c.plan_yolo : plan === 'pro' ? c.plan_pro : c.plan_free;
    planEl.textContent = txt;
    planEl.style.color = plan === 'yolo' ? '#fbbf24' : plan === 'pro' ? '#34d399' : '#6b7280';
  }
  function renderUser(){
    var sso = getSso();
    var userEl = document.getElementById('wh-dr-user');
    var soEl   = document.getElementById('wh-dr-signout');
    var nameEl = document.getElementById('wh-dr-user-name');
    if(sso.token || sso.nick){
      var n = sso.nick || (sso.email && sso.email.split('@')[0]) || '—';
      if(n && /\s/.test(n)) n = n.split(/\s+/)[0];
      nameEl.textContent = n;
      userEl.style.display = '';
      soEl.style.display = '';
    }
  }

  /* ── Sign out ── */
  window.whSignOut = function(){
    try{ localStorage.removeItem('wl_sso'); localStorage.removeItem('wl_plan'); localStorage.removeItem('wl_token'); }catch(e){}
    location.href = 'https://wizelife.ai/auth.html';
  };

  /* ── Init + iframe ── */
  try{ fetch('https://vitara.onrender.com/',{mode:'no-cors',cache:'no-cache'}).catch(function(){}); }catch(e){}
  var lang = getLang();
  var TARGET = 'https://vitara.onrender.com';
  var urlP = new URLSearchParams(location.search);
  var qs = new URLSearchParams();
  ['wl_token','wl_nick','wl_plan','lang'].forEach(function(k){
    var v = urlP.get(k)||'';
    if(v) qs.set(k,v);
  });
  if(!qs.get('lang')) qs.set('lang', lang);

  var iframe = document.getElementById('app-frame');
  iframe.addEventListener('load', function(){
    setTimeout(function(){ whDismiss(false); }, 350);
  }, {once:true});
  setTimeout(function(){ whDismiss(false); }, 8000);
  iframe.src = TARGET + (qs.toString() ? '/?' + qs.toString() : '/');

  /* ── Onboarding ── */
  var c = LANGS[lang] || LANGS.en;
  var force = (urlP.get('ob') === 'force');
  var seen = false;
  try{ seen = !!localStorage.getItem('wl_ob_health'); }catch(e){}
  if(!seen || force){
    document.getElementById('wh-ob-text').textContent = c.ob;
    document.getElementById('wh-ob-btn').textContent  = c.btn;
    document.getElementById('wh-ob-extra').hidden = false;
  }

  applyLang(lang);
  renderUser();

  /* Close drawer on Escape */
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') whCloseDrawer(); });
})();

function whDismiss(markSeen){
  if(markSeen){ try{ localStorage.setItem('wl_ob_health','1'); }catch(e){} }
  var s = document.getElementById('wh-splash');
  var i = document.getElementById('app-frame');
  if(i) i.classList.add('ready');
  if(s) s.classList.add('gone');
  setTimeout(function(){ if(s&&s.parentNode) s.parentNode.removeChild(s); }, 400);
}
</script>
</body>
</html>
